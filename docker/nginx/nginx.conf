# ── e-Partogram Nginx Reverse Proxy ──────────────────────────────────────────
# Handles TLS termination, HTTP→HTTPS redirect, and proxying to Flask backend.
#
# DEV SETUP (self-signed cert):
#   cd nginx/certs
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout server.key -out server.crt \
#     -subj "/CN=localhost/O=e-Partogram"
#
# PROD SETUP (Let's Encrypt via Certbot):
#   certbot certonly --standalone -d yourdomain.com
#   Update ssl_certificate paths below to /etc/letsencrypt/live/yourdomain.com/
# ─────────────────────────────────────────────────────────────────────────────

# Redirect all HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # ── TLS certificates ──────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # ── TLS hardening (TLS 1.2+ only, strong ciphers) ────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # ── OCSP stapling (reduces TLS handshake latency + improves privacy) ────────
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # ── Security headers (complement Flask-Talisman) ─────────────────────────
    # HSTS with preload — submit to https://hstspreload.org after go-live
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy
      "camera=(), microphone=(), geolocation=(), payment=(), accelerometer=(), gyroscope=(), magnetometer=()"
      always;

    # ── Request size cap (matches Flask MAX_CONTENT_LENGTH) ──────────────────
    client_max_body_size 512k;

    # ── API — proxy to Flask backend ──────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:5001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── Frontend static assets ────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }
}
