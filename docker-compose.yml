version: '3.8'

# ── e-Partogram Production Stack ─────────────────────────────────────────────
# All secrets come from .env — never hardcoded here.
# Run:  cp backend/.env .env   then fill in real values before deploying.
#
# Security decisions:
#   - DB port NOT exposed to host (internal network only)
#   - Flask accessible only via Nginx (no direct port 5000/5001 exposure)
#   - All services share one private bridge network (partogram_net)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Nginx — TLS termination + reverse proxy ─────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro        # self-signed (dev) or Let's Encrypt (prod)
    depends_on:
      - backend
    networks:
      - partogram_net

  # ── Redis — rate-limiter storage (multi-process safe) ───────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # No persistence needed (rate counters are ephemeral); disable RDB/AOF to
    # keep memory footprint low and avoid unnecessary disk I/O.
    command: >
      redis-server
        --save ""
        --appendonly no
        --maxmemory 128mb
        --maxmemory-policy allkeys-lru
    networks:
      - partogram_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Flask backend ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env                               # all secrets from environment file
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
      - RATELIMIT_STORAGE_URI=redis://redis:6379/0
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - partogram_net
    # No ports exposed to host — traffic only via Nginx

  # ── React frontend (prod build served by Nginx above) ───────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-https://localhost}
    networks:
      - partogram_net

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  database:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Port NOT exposed to host — backend connects via internal DNS "database:5432"
    networks:
      - partogram_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local

networks:
  partogram_net:
    driver: bridge
